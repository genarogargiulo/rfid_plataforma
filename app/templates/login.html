<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — Panel RFID</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <span class="brand-mark">RFID</span>
      <div class="brand-text">
        <h1>Plataforma RFID</h1>
        <span class="brand-sub">RFID Plataforma de trazabilidad</span>
      </div>
    </div>

    <h2 class="auth-title">Iniciar sesión</h2>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="usuario@empresa.com" required autofocus>
      </div>
      <div class="auth-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary auth-submit">Ingresar</button>
    </form>

  </div>
</div>

</body>
</html>
